<!DOCTYPE html>
<html>
<head>
    <title>Real-Time Chat</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="chat-container">
    <h2>Real-Time Chat</h2>

    <input id="username" placeholder="Enter your name">

    <div class="chat-box">
        <ul id="messages"></ul>
    </div>

    <input id="msg" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
var socket = io();
let joined = false;
const usernameInput = document.getElementById("username");

// ---------- username save ----------
if (localStorage.getItem("chatUser")) {
    usernameInput.value = localStorage.getItem("chatUser");
}

usernameInput.addEventListener("change", function () {
    localStorage.setItem("chatUser", usernameInput.value);
});

// ---------- load history ----------
fetch('/history')
.then(r => r.json())
.then(data => {
    data.messages.forEach(m => {
        addMessage(m[0], m[1], m[2]);
    });
    scrollToBottom();
});

// ---------- send ----------
function sendMessage() {
    let username = usernameInput.value.trim();
    let msg = document.getElementById("msg").value.trim();

    if (username === "") {
        alert("Enter your name first");
        return;
    }

    if (!joined) {
        socket.send("SYSTEM|" + username + " joined the chat");
        joined = true;
    }

    if (msg === "") return;

    socket.send(username + "|" + msg);
    document.getElementById("msg").value = "";
}

// ---------- receive ----------
socket.on("message", function(data) {
    let parts = data.split("|");

    if (parts[0] === "SYSTEM") {
        addSystemMessage(parts[1]);
        scrollToBottom();
        return;
    }

    let username = parts[0];
    let message = parts[1];

    let now = new Date();
    let time = now.toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
    });

    addMessage(username, message, time);
    scrollToBottom();
});

// ---------- add message ----------
function addMessage(username, message, timestamp) {
    let li = document.createElement("li");

    let currentUser = usernameInput.value.trim().toLowerCase();
    let msgUser = username.trim().toLowerCase();

    if (currentUser === msgUser) {
        li.classList.add("my-message");
    } else {
        li.classList.add("other-message");
    }

    li.innerHTML = `
        <span class="time">${timestamp}</span><br>
        <strong>${username}</strong><br>
        ${message}
    `;

    document.getElementById("messages").appendChild(li);
}

// ---------- system message ----------
function addSystemMessage(text) {
    let li = document.createElement("li");
    li.classList.add("system-message");
    li.innerText = text;
    document.getElementById("messages").appendChild(li);
}

// ---------- scroll ----------
function scrollToBottom() {
    let chatBox = document.querySelector(".chat-box");
    chatBox.scrollTop = chatBox.scrollHeight;
}

// ---------- enter key ----------
document.getElementById("msg").addEventListener("keyup", function(e) {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
